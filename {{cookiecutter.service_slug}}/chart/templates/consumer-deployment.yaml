{{- /* One Deployment per Kafka consumer. Consumers run separately from the web
       pods so they scale and fail independently of the API. */ -}}
{{- range .Values.consumers }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "svc.fullname" $ }}-{{ .name }}
  labels:
    {{- include "svc.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
spec:
  replicas: {{ .replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "svc.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "svc.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ .name }}
    spec:
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .name }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: {{ .command | toJson }}
          envFrom:
            {{- include "svc.envFrom" $ | nindent 12 }}
          {{- if $.Values.postgres.enabled }}
          env:
            {{- include "svc.dbEnv" $ | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
{{- end }}
