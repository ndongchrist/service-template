{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "svc.fullname" . }}-migrate
  labels:
    {{- include "svc.labels" . | nindent 4 }}
  annotations:
    # Self-applying deploys: migrations run before the new pods roll.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "svc.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        # Block until Postgres accepts TCP — CNPG bootstrap takes ~60-90s and
        # would otherwise race the migration.
        - name: wait-for-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -c
            - |
              import os, socket, sys, time
              host = os.environ["POSTGRES_HOST"]
              port = int(os.environ.get("POSTGRES_PORT", "5432"))
              for _ in range(150):
                  try:
                      socket.create_connection((host, port), 2).close()
                      print("database is up"); sys.exit(0)
                  except OSError as exc:
                      print("waiting for database:", exc); time.sleep(2)
              sys.exit("timed out waiting for database")
          env:
            {{- include "svc.dbEnv" . | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            {{- include "svc.envFrom" . | nindent 12 }}
          {{- if .Values.postgres.enabled }}
          env:
            {{- include "svc.dbEnv" . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
